# Canonical Python CI — copy to .github/workflows/ci.yml. Drop the `web` note if no frontend.
#
# Single source of truth: the authoritative correctness check is `scripts/gate.sh` — the SAME
# gate you run locally (CONSTITUTION §4: "CI mirrors the local gate exactly"). Never duplicate
# ruff/pytest invocations here; if a check belongs in CI, it belongs in the gate.
#
# Zero-trust: actions are pinned to a full commit SHA (a tag is mutable, a SHA is not). Dependabot
# is intentionally off in this repo (BIBLE decision), so pins are refreshed deliberately, by hand.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e "./evaluator[dev]"
      # Node is needed so the gate's web surface (app/ — verify:ci) runs instead of being skipped.
      # The gate only exercises app/ when app/node_modules is present, so install it before the gate.
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --prefix app
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Hard gate (lint · format · tests · guardrails · shellcheck · web verify:ci)
        run: ./scripts/gate.sh

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - run: pip install -e "./evaluator[dev]"
      - name: Audit Python dependencies for known CVEs
        run: |
          # Patch the runner's build tooling first — setuptools < 83.0.0 has PYSEC-2026-3447.
          pip install --upgrade "setuptools>=83.0.0" pip-audit
          pip-audit
      # Node surface — mirror the pip-audit intent for app/. Gate on high/critical only so a
      # low-severity transitive advisory in dev tooling doesn't turn CI red without a real fix.
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Audit app dependencies for known CVEs
        run: npm audit --prefix app --audit-level=high

  # Authoritative secret scan — full history, driven by .gitleaks.toml.
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Required so the action can enumerate PR commits via the API (breaking change in the
          # action). Pushes to main scanned fine without it; the first PR surfaced the gap.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
